<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>曼尼森林 - 私人财富守护神测评</title>
    <style>
        :root {
            --primary-color: #2F4F4F; 
            --bg-color: #F8F9FA; 
            --card-bg: #FFFFFF;
            --text-color: #333333;
            --accent-color: #B8860B; 
        }
        body {
            font-family: 'PingFang SC', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background-color: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            max-width: 550px;
            width: 100%;
            padding: 40px 30px;
            text-align: center;
        }
        h1 {
            color: var(--primary-color);
            font-size: 26px;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        p.subtitle {
            color: #888;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .progress-bar {
            width: 100%;
            background-color: #E9ECEF;
            border-radius: 8px;
            height: 6px;
            margin-bottom: 30px;
            overflow: hidden;
        }
        .progress {
            height: 100%;
            background-color: var(--accent-color);
            width: 0%;
            transition: width 0.4s ease;
        }
        .question-meta {
            font-size: 12px;
            color: #999;
            text-align: left;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        .question-text {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 30px;
            line-height: 1.6;
            text-align: left;
            color: #222;
        }
        .option-btn {
            display: block;
            width: 100%;
            padding: 16px 20px;
            margin-bottom: 15px;
            background-color: #FDFDFD;
            border: 1px solid #E0E0E0;
            border-radius: 12px;
            font-size: 16px;
            color: #444;
            text-align: left;
            line-height: 1.5;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .option-btn:hover {
            border-color: var(--primary-color);
            background-color: #F4F7F6;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(47, 79, 79, 0.08);
        }
        .result-box {
            display: none; 
        }
        .res-header {
            margin-bottom: 20px;
        }
        .action-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            text-align: center;
            font-weight: bold;
            letter-spacing: 1px;
            margin-top: 15px;
        }
        .action-btn:hover {
            background-color: #1a3333;
            color: white;
        }
    </style>
</head>
<body>

<div class="container" id="quiz-container">
    <h1>曼尼森林初级试炼</h1>
    <p class="subtitle">私人银行级 KYC 财务风险偏好测定</p >
    
    <div class="progress-bar">
        <div class="progress" id="progress"></div>
    </div>

    <div id="question-area">
        <div class="question-meta" id="question-progress">进度 1 / 28</div>
        <div class="question-text" id="question-text">加载中...</div>
        <button class="option-btn" id="btn-a" onclick="selectOption(0)">选项 A</button>
        <button class="option-btn" id="btn-b" onclick="selectOption(1)">选项 B</button>
    </div>
</div>

<div class="container result-box" id="result-container">
    <div class="res-header">
        <h1 style="margin-bottom: 10px;">试炼完成</h1>
        <p class="subtitle" style="margin-bottom: 25px;">为您揭晓专属财富守护神</p >
    </div>
    
    <div style="text-align: center; margin-bottom: 20px;">
        <img id="res-image" src="" alt="财富守护神卡牌" style="max-width: 100%; border-radius: 16px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); display: none;">
    </div>
    
    <p style="color: #888; font-size: 13px; margin-bottom: 25px;">💡 提示：可长按或右键保存您的专属卡牌</p >
    
    <button class="option-btn action-btn" onclick="location.reload()">重新进行测试</button>
</div>

<script>
    let scores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };
    let currentQuestion = 0;

    const questions = [
        { text: "当你需要了解一个全新的投资领域时，你更倾向于：", options: [{ text: "参加相关的线下沙龙、找圈内朋友交流或在社群里提问", val: "E" }, { text: "自己默默搜索深度研报、阅读专业文章和底层数据", val: "I" }] },
        { text: "面对市场上突然爆火、大家都在讨论的“造富神话”，你的第一反应是：", options: [{ text: "感到兴奋，想赶紧找人打听怎么参与，怕错过机会", val: "E" }, { text: "保持警惕，觉得人多的地方危险，先自己冷眼旁观", val: "I" }] },
        { text: "在做出一个重大财务决策（如大额加仓或重资产配置）前，你通常会：", options: [{ text: "广泛征求身边专业人士或朋友的意见，讨论能理清思路", val: "E" }, { text: "基本上在自己脑海里已经推演完毕，极少需要与他人讨论", val: "I" }] },
        { text: "私人银行顾问为你定制了一套复杂的财富传承方案，你更喜欢哪种沟通方式？", options: [{ text: "面对面聊聊，我有很多发散性的问题想直接问", val: "E" }, { text: "先把详细的方案和条款发给我，我自己看完了再说", val: "I" }] },
        { text: "周末复盘本周的投资盈亏时，你觉得哪种方式更让你觉得有收获？", options: [{ text: "约几个懂行的朋友，一边喝着精品手冲一边探讨市场", val: "E" }, { text: "自己一个人安静地坐在书桌前，独自看盘、整理数据", val: "I" }] },
        { text: "在高端投资交流群或校友群里，你的常态是：", options: [{ text: "经常发言，分享自己的看法，喜欢思想碰撞带来的灵感", val: "E" }, { text: "万年潜水党，只看别人的逻辑，极少发表自己的观点", val: "I" }] },
        { text: "如果你在某项高风险投资上赚了一大笔钱，你会：", options: [{ text: "忍不住和亲近的人分享这份喜悦和成功的操盘经验", val: "E" }, { text: "觉得没必要声张，默默把利润转入下一个资产包", val: "I" }] },
        { text: "如果要在你的投资组合中加入一家新公司，你最看重它的哪一点？", options: [{ text: "过去五年扎实的财务报表、充沛的现金流和持续的分红", val: "S" }, { text: "它的CEO描绘的十年后改变行业的宏大愿景和颠覆性技术", val: "N" }] },
        { text: "阅读一份上市公司的年度报告，你通常最先看哪里？", options: [{ text: "具体的利润表、资产负债表和核心运营数据", val: "S" }, { text: "董事长致辞、未来的战略规划和新业务布局", val: "N" }] },
        { text: "对于某些处于萌芽期的前沿创新概念资产，你的态度是：", options: [{ text: "觉得太虚无缥缈，等它们真正普及并产生正向盈利再说", val: "S" }, { text: "非常感兴趣，认为这就是未来的趋势，愿意用小资金押注", val: "N" }] },
        { text: "回顾过去的投资经历，你最得意的操作通常是因为：", options: [{ text: "极其严谨地分析了基本面数据，买在了被极度低估的低点", val: "S" }, { text: "凭着对未来趋势的敏锐嗅觉，提前几年埋伏了后来的风口", val: "N" }] },
        { text: "面对一份极其详尽但略显枯燥的50页尽调报告，你会：", options: [{ text: "耐心逐页阅读，尤其是其中的数据图表和附录细节", val: "S" }, { text: "直接跳到结论和摘要，抓取核心逻辑，细节不太在意", val: "N" }] },
        { text: "你更喜欢哪种类型的理财进阶课程？", options: [{ text: "讲授具体的实操技巧、财务指标分析和落地案例复盘", val: "S" }, { text: "探讨全球宏观经济周期、地缘政经格局演变和产业大趋势", val: "N" }] },
        { text: "你认为成功的理财更依赖于：", options: [{ text: "丰富的历史经验和对商业常识的坚守", val: "S" }, { text: "超前的洞察力和不断颠覆自我认知的魄力", val: "N" }] },
        { text: "你重仓的一只基金突然无预警下跌了15%，你当晚的状态是：", options: [{ text: "迅速查阅资讯和宏观数据，冷酷计算是否需要止损或加仓", val: "T" }, { text: "感到焦虑或沮丧，在心里默默祈祷它涨回来或寻找安慰", val: "F" }] },
        { text: "某理财产品收益极高，但底层资产涉及严重污染环境的企业。你会：", options: [{ text: "只要产品合法合规且收益可观，道德问题不影响财务决策", val: "T" }, { text: "心里非常抗拒，宁愿少赚一点，也不把钱投给价值观不合的地方", val: "F" }] },
        { text: "你在朋友初创公司投资的钱快打水漂了，朋友又来借钱周转，你会：", options: [{ text: "严格评估救活的概率(ROI)，如果没戏果断拒绝及时止损", val: "T" }, { text: "考虑到多年交情和对方处境，即使知道打水漂也会借钱", val: "F" }] },
        { text: "你在做止盈决策时，最主要的依据是：", options: [{ text: "达到了预先设定的目标收益率，或估值模型显示已经偏高", val: "T" }, { text: "感觉赚得差不多了，心里有了一种“落袋为安”的满足感", val: "F" }] },
        { text: "在选择理财合伙人或高管团队时，你更看重他：", options: [{ text: "专业能力极强，历史业绩优秀，哪怕性格有些冷漠高傲", val: "T" }, { text: "沟通让人如沐春风，非常理解我的诉求，让我有强烈安全感", val: "F" }] },
        { text: "面对市场暴跌，你听到别人“血本无归”的惨状时，你的内心戏是：", options: [{ text: "分析他们做错了哪一步，提醒自己不要犯同样的逻辑错误", val: "T" }, { text: "深深共情他们的痛苦，甚至因此对资本市场产生一丝恐惧", val: "F" }] },
        { text: "你认为卓越的财富管理规划应该是：", options: [{ text: "像机器一样冷酷、客观，完全用数据、对冲和纪律说话", val: "T" }, { text: "充满人性关怀，能兼顾家人的幸福感、健康保障和生活品质", val: "F" }] },
        { text: "面对一笔刚到账的丰厚分红或年终奖，你的第一反应是：", options: [{ text: "按年初做好的表格，有条不紊地将资金划入固收和权益账户", val: "J" }, { text: "先放在活期里，边走边看，最近如果有大跌好机会就一把投入", val: "P" }] },
        { text: "对于“严格纪律定投”这种策略，你的真实感受是：", options: [{ text: "非常认同且能严格执行，喜欢这种纪律带来的确定性和掌控感", val: "J" }, { text: "觉得有点死板，我更喜欢自己择时，逢低多买点，逢高少买点", val: "P" }] },
        { text: "在安排一趟高强度的旅行（如大雪山徒步）时，你会：", options: [{ text: "出发前就把路线图、装备清单、行程和预算规划得明明白白", val: "J" }, { text: "确定个大方向和充足的备用金就出发，到了当地随性调整", val: "P" }] },
        { text: "如果计划三年后进行大额支出（如换房），你的资金准备方式是：", options: [{ text: "倒推每个月需要存多少钱，并严格锁定在一个安全性极高的账户里", val: "J" }, { text: "先努力搞钱投资，到时候看手头有多少总资产再决定支出规模", val: "P" }] },
        { text: "当市场的走势完全偏离了你之前的预判和计划时，你会：", options: [{ text: "感到焦虑和不适，急于寻找原因并迅速制定新计划恢复秩序", val: "J" }, { text: "觉得很正常，市场本来就是千变万化的，顺势调整策略就好", val: "P" }] },
        { text: "你的股票或基金账户里的持仓情况通常是：", options: [{ text: "数量固定在几只，仓位比例明确，且很少轻易增加新的标的", val: "J" }, { text: "经常变动，看到感兴趣的机会就会买一点试试，持仓相对发散", val: "P" }] },
        { text: "你更希望别人评价你的理财风格是：", options: [{ text: "稳扎稳打，极具条理性和纪律性，步步为营", val: "J" }, { text: "嗅觉灵敏，极具弹性和爆发力，总能敏锐捕捉战机", val: "P" }] }
    ];

    const dictionary = {
        "ENTP": { image_url: "entp.png" },
        "ENTJ": { image_url: "entj.png" },
        "ESTP": { image_url: "estp.png" },
        "INTJ": { image_url: "intj.png" },
        "INTP": { image_url: "intp.png" },
        "ENFJ": { image_url: "enfj.png" },
        "ENFP": { image_url: "enfp.png" },
        "ESTJ": { image_url: "estj.png" },
        "ISTP": { image_url: "istp.png" },
        "ESFP": { image_url: "esfp.png" },
        "ISTJ": { image_url: "istj.png" },
        "INFJ": { image_url: "infj.png" },
        "ISFJ": { image_url: "isfj.png" },
        "ESFJ": { image_url: "esfj.png" },
        "ISFP": { image_url: "isfp.png" },
        "INFP": { image_url: "infp.png" }
    };

    function renderQuestion() {
        if (currentQuestion >= questions.length) {
            showResult();
            return;
        }
        let q = questions[currentQuestion];
        document.getElementById('question-progress').innerText = "测评进度 " + (currentQuestion + 1) + " / " + questions.length;
        document.getElementById('question-text').innerText = q.text;
        document.getElementById('btn-a').innerText = "A. " + q.options[0].text;
        document.getElementById('btn-b').innerText = "B. " + q.options[1].text;
        
        let progressPercent = (currentQuestion / questions.length) * 100;
        document.getElementById('progress').style.width = progressPercent + "%";
    }

    function selectOption(index) {
        let val = questions[currentQuestion].options[index].val;
        scores[val]++; 
        currentQuestion++;
        renderQuestion();
    }

    function showResult() {
        document.getElementById('quiz-container').style.display = 'none';
        document.getElementById('result-container').style.display = 'block';

        let mbti = "";
        mbti += (scores.E > scores.I) ? "E" : "I";
        mbti += (scores.S > scores.N) ? "S" : "N";
        mbti += (scores.T > scores.F) ? "T" : "F";
        mbti += (scores.J > scores.P) ? "J" : "P";

        let result = dictionary[mbti];
        let imgElement = document.getElementById('res-image');
        
        imgElement.src = result.image_url;
        imgElement.style.display = 'inline-block';
    }

    renderQuestion();
</script>
</body>
</html>
